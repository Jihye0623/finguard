spring:
  application:
    name: finguard

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/finguard
    driver-class-name: org.postgresql.Driver
    username: finguard
    password: finguard1234

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, loggers
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.apipulse: DEBUG
  file:
    name: /app/logs/finguard.log

langchain4j:
  open-ai:
    chat-model:
      api-key: ${OPENAI_API_KEY}
      model-name: gpt-4o-mini
      temperature: 0.3
      max-tokens: 2000

elasticsearch:
  uris: http://localhost:9200

slack:
  webhook-url: