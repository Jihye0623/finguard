spring:
  datasource:
    url: jdbc:h2:mem:apipulse
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  h2:
    console:
      enabled: true

datasource:
  url: jdbc:h2:mem:apipulse;DB_CLOSE_DELAY=-1
  driver-class-name: org.h2.Driver
  username: sa
  password:

jpa:
  hibernate:
    ddl-auto: create-drop
  show-sql: false
  properties:
    hibernate:
      format_sql: true

h2:
  console:
    enabled: true
    path: /h2-console

server:
port: 8080

management:
endpoints:
  web:
    exposure:
      include: health, info, metrics, loggers
endpoint:
  health:
    show-details: always

logging:
level:
  root: INFO
  com.apipulse: DEBUG
file:
  name: logs/api-pulse.log