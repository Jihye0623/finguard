services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: api-pulse-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false       # 로컬 개발용 보안 비활성화
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - api-pulse-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 10s
      timeout: 5s
      retries: 5

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: api-pulse-logstash
    volumes:
      - ./elk/logstash/pipeline:/usr/share/logstash/pipeline
      - ./elk/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml
      - ./api-pulse-app/logs:/logs                # Spring Boot 로그 파일 공유
    ports:
      - "5044:5044"
    networks:
      - api-pulse-net
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: api-pulse-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - api-pulse-net
    depends_on:
      elasticsearch:
        condition: service_healthy

  app:
    build:
      context: ./api-pulse-app
      dockerfile: Dockerfile
    container_name: api-pulse-app
    ports:
      - "8080:8080"
    volumes:
      - ./api-pulse-app/logs:/app/logs        # 로그 파일 Logstash와 공유
    networks:
      - api-pulse-net
    depends_on:
      - logstash

volumes:
  es-data:

networks:
  api-pulse-net:
    driver: bridge